<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorcerer's Ascent - FINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #050505; color: white; font-family: 'Cinzel', serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #game-container { position: relative; padding: 20px; background: #111; border-radius: 12px; border: 2px solid #333; box-shadow: 0 0 50px rgba(0,0,0,1); }
        #ui-layer { display: flex; justify-content: space-between; margin-bottom: 15px; align-items: center; width: 800px; }
        canvas { border: 4px solid #444; border-radius: 8px; background: #000; display: block; }
        #overlay, #game-over { position: absolute; top: 60px; left: 20px; width: 800px; height: 400px; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 8px; z-index: 20; }
        #game-over { display: none; background: rgba(20,0,0,0.85); }
        button { padding: 15px 40px; font-size: 1.5em; cursor: pointer; background: #6a0dad; color: white; border: none; border-radius: 8px; font-weight: bold; box-shadow: 0 0 15px #6a0dad; font-family: 'Cinzel', serif; transition: transform 0.1s; }
        button:active { transform: scale(0.95); }
        #controls-hint { margin-top: 15px; display: flex; justify-content: center; gap: 30px; opacity: 0.6; font-size: 0.9em; width: 800px; }
        .stat-box { background: #222; padding: 8px 15px; border-radius: 20px; border: 1px solid #444; min-width: 100px; text-align: center; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-layer">
        <div class="stat-box" id="score">SCORE: 0</div>
        <div id="health" style="font-size: 24px; letter-spacing: 5px;">❤️❤️❤️</div>
        <div class="stat-box">SPELL: <span id="spell-name" style="color: #ff4500;">FIRE</span></div>
        <button id="mute-btn" style="padding: 5px 12px; font-size: 1em; background: #333; box-shadow: none;">🔊</button>
    </div>

    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <div id="overlay">
        <h1 style="font-size: 3.5em; color: #6a0dad; margin-bottom: 10px; text-shadow: 0 0 20px #6a0dad;">SORCERER'S ASCENT</h1>
        <p style="margin-bottom: 30px; opacity: 0.8;">FEATURING: "CIRCUITS"</p>
        <button id="start-btn">ENTER THE FOREST</button>
    </div>

    <div id="game-over">
        <h2 style="font-size: 3em; color: #ff4b2b; margin-bottom: 20px;">THE SORCERER HAS FALLEN</h2>
        <button id="restart-btn">REVIVE</button>
    </div>

    <div id="controls-hint">
        <div><b>W / UP</b> - JUMP</div>
        <div><b>A / D</b> - MOVE</div>
        <div><b>SPACE</b> - BLAST</div>
        <div><b>1 - 3</b> - SWITCH SPELLS</div>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const ASSETS = {
    bg: "https://storage.googleapis.com/producer-app-public/assets/097f4ebd-6180-4e46-8ed0-1b2afdd39c8d.jpg",
    music: "https://storage.googleapis.com/producer-app-public/clips/612a8dcd-42db-4d74-961c-feb18682ac03.m4a"
};

const GRAVITY = 0.4, PLAYER_SPEED = 6, JUMP_FORCE = -11;
let gameState = 'waiting', score = 0, health = 3, spell = 'fire', isMuted = false;
let bgOffset = 0, lastSpawnTime = 0;
const keys = {};

let player = {
    x: 50, y: 270, width: 60, height: 80, vy: 0, isJumping: false, 
    direction: 1, invulnerable: 0, animTimer: 0, scaleX: 1, scaleY: 1, rotation: 0 
};
let projectiles = [], enemies = [], particles = [];

const bgImg = new Image(); bgImg.src = ASSETS.bg; bgImg.crossOrigin = "anonymous";
const audio = new Audio(ASSETS.music); audio.loop = true; audio.crossOrigin = "anonymous";

window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code === "Digit1") setSpell('fire');
    if (e.code === "Digit2") setSpell('laser');
    if (e.code === "Digit3") setSpell('lightning');
    if (e.code === "Space") { e.preventDefault(); if (gameState === 'playing') shoot(); }
    if (e.code === "KeyW" || e.code === "ArrowUp") e.preventDefault();
});
window.addEventListener('keyup', e => keys[e.code] = false);

function setSpell(type) {
    spell = type;
    const colors = { fire: '#ff4500', laser: '#00ffff', lightning: '#ffff00' };
    document.getElementById('spell-name').innerText = type.toUpperCase();
    document.getElementById('spell-name').style.color = colors[type];
}

document.getElementById('start-btn').onclick = () => {
    document.getElementById('overlay').style.display = 'none';
    gameState = 'playing';
    audio.play().catch(() => {});
    requestAnimationFrame(render);
};

document.getElementById('restart-btn').onclick = resetGame;
document.getElementById('mute-btn').onclick = () => {
    isMuted = !isMuted; audio.muted = isMuted;
    document.getElementById('mute-btn').innerText = isMuted ? "🔇" : "🔊";
};

function shoot() {
    let color = "#ff4500", width = 15;
    if (spell === "laser") { color = "#00ffff"; width = 40; }
    if (spell === "lightning") { color = "#ffff00"; width = 20; }
    projectiles.push({ x: player.direction === 1 ? player.x + player.width : player.x - width, y: player.y + 40, width, height: 8, vx: player.direction * 12, color, type: spell });
    player.scaleX = 0.8; player.scaleY = 1.2;
    createParticles(player.x + (player.direction === 1 ? player.width : 0), player.y + 40, color, 10);
}

function createParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        particles.push({ x, y, vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6, life: 1.0, color, size: Math.random() * 4 + 2 });
    }
}

function spawnEnemy() {
    const now = Date.now();
    if (now - lastSpawnTime > 1500 && Math.random() < 0.02) {
        enemies.push({ x: 800, y: 280, width: 50, height: 70 });
        lastSpawnTime = now;
    }
}

function resetGame() {
    player = { x: 50, y: 270, width: 60, height: 80, vy: 0, isJumping: false, direction: 1, invulnerable: 0, animTimer: 0, scaleX: 1, scaleY: 1, rotation: 0 };
    projectiles = []; enemies = []; particles = []; score = 0; health = 3;
    document.getElementById('health').innerText = "❤️❤️❤️";
    document.getElementById('game-over').style.display = 'none';
    gameState = 'playing';
}

function render() {
    if (gameState !== 'playing') return;

    ctx.clearRect(0, 0, 800, 400);
    bgOffset = (bgOffset + 0.5) % 800;
    ctx.drawImage(bgImg, -bgOffset, 0, 800, 400);
    ctx.drawImage(bgImg, 800 - bgOffset, 0, 800, 400);

    let moving = false;
    player.rotation *= 0.9;
    player.scaleX += (1 - player.scaleX) * 0.1;
    player.scaleY += (1 - player.scaleY) * 0.1;

    if (keys["KeyA"] || keys["ArrowLeft"]) { player.x -= PLAYER_SPEED; player.direction = -1; player.rotation = -0.1; moving = true; }
    if (keys["KeyD"] || keys["ArrowRight"]) { player.x += PLAYER_SPEED; player.direction = 1; player.rotation = 0.1; moving = true; }
    if ((keys["KeyW"] || keys["ArrowUp"]) && !player.isJumping) { player.vy = JUMP_FORCE; player.isJumping = true; player.scaleX = 0.7; player.scaleY = 1.3; }

    player.animTimer = moving ? player.animTimer + 0.2 : player.animTimer * 0.9;
    player.vy += GRAVITY; player.y += player.vy;
    if (player.y > 270) {
        if (player.isJumping) { player.scaleX = 1.3; player.scaleY = 0.7; createParticles(player.x + 30, 350, "#555", 8); }
        player.y = 270; player.vy = 0; player.isJumping = false;
    }
    player.x = Math.max(0, Math.min(740, player.x));
    if (player.invulnerable > 0) player.invulnerable--;

    // Draw Player
    if (player.invulnerable % 10 < 5) {
        ctx.save();
        const bob = Math.sin(player.animTimer) * 4;
        ctx.translate(player.x + 30, player.y + 40 + bob);
        ctx.rotate(player.rotation);
        ctx.scale(player.direction * player.scaleX, player.scaleY);
        ctx.fillStyle = "#4B0082"; // Robe
        ctx.beginPath(); ctx.moveTo(-20, 40); ctx.lineTo(20, 40); ctx.lineTo(15, -10); ctx.lineTo(-15, -10); ctx.closePath(); ctx.fill();
        ctx.fillStyle = "#2E0854"; // Hat
        ctx.beginPath(); ctx.moveTo(-25, -10); ctx.lineTo(25, -10); ctx.lineTo(0, -45); ctx.closePath(); ctx.fill();
        ctx.fillRect(-28, -12, 56, 4);
        ctx.strokeStyle = "#4d2b19"; ctx.lineWidth = 4; // Staff
        ctx.beginPath(); ctx.moveTo(25, 40); ctx.lineTo(25, -20); ctx.stroke();
        ctx.fillStyle = spell === "fire" ? "#ff4500" : spell === "laser" ? "#00ffff" : "#ffff00";
        ctx.shadowBlur = 15; ctx.shadowColor = ctx.fillStyle;
        ctx.beginPath(); ctx.arc(25, -25, 6, 0, Math.PI * 2); ctx.fill(); ctx.restore();
    }

    // Particles & Projectiles
    particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.life -= 0.02; ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.size, p.size); if (p.life <= 0) particles.splice(i, 1); });
    ctx.globalAlpha = 1.0;
    projectiles.forEach((p, i) => { p.x += p.vx; ctx.fillStyle = p.color; ctx.shadowBlur = 15; ctx.shadowColor = p.color; ctx.fillRect(p.x, p.y, p.width, p.height); ctx.shadowBlur = 0; if (p.x > 800 || p.x < -40) projectiles.splice(i, 1); });

    // Enemies
    spawnEnemy();
    enemies.forEach((enemy, eIdx) => {
        enemy.x -= 1.5;
        ctx.save();
        const eBob = Math.sin(Date.now() / 200) * 3;
        ctx.translate(enemy.x + 25, enemy.y + 35 + eBob);
        ctx.fillStyle = "#e0e0e0"; ctx.beginPath(); ctx.arc(0, -25, 12, 0, Math.PI * 2); ctx.fill(); // Head
        ctx.fillStyle = "#ff0000"; ctx.beginPath(); ctx.arc(-4, -26, 2, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(4, -26, 2, 0, Math.PI*2); ctx.fill(); // Eyes
        ctx.strokeStyle = "#e0e0e0"; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(0, -13); ctx.lineTo(0, 15); ctx.stroke(); // Spine
        ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(-10, -5); ctx.lineTo(10, -5); ctx.stroke(); ctx.beginPath(); ctx.moveTo(-10, 5); ctx.lineTo(10, 5); ctx.stroke(); // Ribs
        const legSwing = Math.sin(Date.now() / 150) * 12; // Leg Animation
        ctx.beginPath(); ctx.moveTo(0, 15); ctx.lineTo(-8 + legSwing, 35); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, 15); ctx.lineTo(8 - legSwing, 35); ctx.stroke();
        ctx.restore();

        projectiles.forEach((p, pIdx) => {
            if (p.x < enemy.x + 50 && p.x + p.width > enemy.x && p.y < enemy.y + 70 && p.y + 8 > enemy.y) {
                createParticles(enemy.x + 25, enemy.y + 35, "#fff", 15); enemies.splice(eIdx, 1);
                if (p.type !== "laser") projectiles.splice(pIdx, 1);
                score += 10; document.getElementById('score').innerText = "SCORE: " + score;
            }
        });

        if (player.invulnerable === 0 && player.x < enemy.x + 40 && player.x + 50 > enemy.x + 10 && player.y < enemy.y + 70 && player.y + 80 > enemy.y) {
            health--; document.getElementById('health').innerText = "❤️".repeat(health) + "🖤".repeat(3-health);
            if (health <= 0) { gameState = 'gameover'; document.getElementById('game-over').style.display = 'flex'; }
            player.invulnerable = 60;
        }
        if (enemy.x < -50) enemies.splice(eIdx, 1);
    });

    requestAnimationFrame(render);
}
</script>
</body>
</html>
