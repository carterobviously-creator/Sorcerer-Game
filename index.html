<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorcerer's Ascent</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
            font-family: 'Cinzel', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            padding: 20px;
            background: #111;
            border-radius: 12px;
            border: 2px solid #333;
        }
        #ui-layer {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            align-items: center;
        }
        canvas {
            border: 4px solid #444;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            display: block;
        }
        #overlay {
            position: absolute;
            top: 60px; /* Offset for UI */
            left: 20px;
            width: 800px;
            height: 400px;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            z-index: 10;
        }
        #game-over {
            display: none;
            position: absolute;
            top: 60px;
            left: 20px;
            width: 800px;
            height: 400px;
            background: rgba(0,0,0,0.8);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
        }
        button {
            padding: 15px 40px;
            font-size: 1.5em;
            cursor: pointer;
            background: #6a0dad;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            box-shadow: 0 0 15px #6a0dad;
            font-family: 'Cinzel', serif;
        }
        #controls-hint {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 20px;
            opacity: 0.7;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-layer">
        <div id="score">Score: 0</div>
        <div id="health">❤️❤️❤️</div>
        <div id="spell-ui">Spell: <span id="spell-name" style="color: #ff4500;">FIRE</span></div>
        <button id="mute-btn" style="padding: 5px 10px; font-size: 1em;">🔊</button>
    </div>

    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <div id="overlay">
        <h1 style="font-size: 3em; color: #6a0dad; margin-bottom: 20px; text-shadow: 0 0 10px #6a0dad;">SORCERER'S ASCENT</h1>
        <button id="start-btn">START GAME</button>
        <p style="margin-top: 20px; opacity: 0.6;">Music: "Circuits"</p>
    </div>

    <div id="game-over">
        <h2 style="font-size: 3em; color: #ff4b2b; margin-bottom: 20px;">THE SORCERER HAS FALLEN</h2>
        <button id="restart-btn">REVIVE</button>
    </div>

    <div id="controls-hint">
        <div><b>WASD</b> - Move/Jump</div>
        <div><b>SPACE</b> - Blast</div>
        <div><b>1-3</b> - Spells</div>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Assets
const ASSETS = {
    bg: "https://storage.googleapis.com/producer-app-public/assets/097f4ebd-6180-4e46-8ed0-1b2afdd39c8d.jpg",
    music: "https://storage.googleapis.com/producer-app-private/clips/612a8dcd-42db-4d74-961c-feb18682ac03.m4a"
};

// Game Constants
const GRAVITY = 0.4;
const PLAYER_SPEED = 6;
const JUMP_FORCE = -11;

// Game State
let gameState = 'waiting';
let score = 0;
let health = 3;
let spell = 'fire';
let isMuted = false;
let bgOffset = 0;
let lastSpawnTime = 0;
const keys = {};

// Entity Refs
let player = {
    x: 50, y: 270, width: 60, height: 80, vy: 0, 
    isJumping: false, direction: 1, invulnerable: 0, 
    animTimer: 0, scaleX: 1, scaleY: 1, rotation: 0 
};
let projectiles = [];
let enemies = [];
let particles = [];

// Audio & Images
const bgImg = new Image();
bgImg.src = ASSETS.bg;
bgImg.crossOrigin = "anonymous";

const audio = new Audio(ASSETS.music);
audio.loop = true;
audio.crossOrigin = "anonymous";

// Controls
window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code === "Digit1") setSpell('fire');
    if (e.code === "Digit2") setSpell('laser');
    if (e.code === "Digit3") setSpell('lightning');
    if (e.code === "Space") {
        e.preventDefault();
        if (gameState === 'playing') shoot();
    }
});
window.addEventListener('keyup', e => keys[e.code] = false);

function setSpell(type) {
    spell = type;
    const colors = { fire: '#ff4500', laser: '#00ffff', lightning: '#ffff00' };
    document.getElementById('spell-name').innerText = type.toUpperCase();
    document.getElementById('spell-name').style.color = colors[type];
}

document.getElementById('start-btn').onclick = () => {
    document.getElementById('overlay').style.display = 'none';
    gameState = 'playing';
    audio.play();
    render();
};

document.getElementById('restart-btn').onclick = resetGame;
document.getElementById('mute-btn').onclick = () => {
    isMuted = !isMuted;
    audio.muted = isMuted;
    document.getElementById('mute-btn').innerText = isMuted ? "🔇" : "🔊";
};

function shoot() {
    let color = "#ff4500", width = 15;
    if (spell === "laser") { color = "#00ffff"; width = 40; }
    if (spell === "lightning") { color = "#ffff00"; width = 20; }

    projectiles.push({
        x: player.direction === 1 ? player.x + player.width : player.x - width,
        y: player.y + player.height / 2,
        width, height: 8,
        vx: player.direction * 12,
        color, type: spell
    });
    player.scaleX = 0.8; player.scaleY = 1.2;
    createParticles(player.x + (player.direction === 1 ? player.width : 0), player.y + player.height/2, color, 10);
}

function createParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x, y,
            vx: (Math.random() - 0.5) * 6,
            vy: (Math.random() - 0.5) * 6,
            life: 1.0, color, size: Math.random() * 4 + 2
        });
    }
}

function spawnEnemy() {
    const now = Date.now();
    if (now - lastSpawnTime > 1500 && Math.random() < 0.02) {
        enemies.push({ x: 800, y: 280, width: 50, height: 70 });
        lastSpawnTime = now;
    }
}

function resetGame() {
    player = { x: 50, y: 270, width: 60, height: 80, vy: 0, isJumping: false, direction: 1, invulnerable: 0, animTimer: 0, scaleX: 1, scaleY: 1, rotation: 0 };
    projectiles = []; enemies = []; particles = []; score = 0; health = 3;
    document.getElementById('score').innerText = "Score: 0";
    document.getElementById('health').innerText = "❤️❤️❤️";
    document.getElementById('game-over').style.display = 'none';
    gameState = 'playing';
}

function render() {
    if (gameState !== 'playing') return;

    // Background
    bgOffset = (bgOffset + 0.5) % 800;
    ctx.drawImage(bgImg, -bgOffset, 0, 800, 400);
    ctx.drawImage(bgImg, 800 - bgOffset, 0, 800, 400);

    // Player Logic
    let moving = false;
    player.rotation *= 0.9;
    player.scaleX += (1 - player.scaleX) * 0.1;
    player.scaleY += (1 - player.scaleY) * 0.1;

    if (keys["ArrowLeft"] || keys["KeyA"]) { player.x -= PLAYER_SPEED; player.direction = -1; player.rotation = -0.1; moving = true; }
    if (keys["ArrowRight"] || keys["KeyD"]) { player.x += PLAYER_SPEED; player.direction = 1; player.rotation = 0.1; moving = true; }
    if ((keys["ArrowUp"] || keys["KeyW"]) && !player.isJumping) { player.vy = JUMP_FORCE; player.isJumping = true; player.scaleX = 0.7; player.scaleY = 1.3; }

    player.animTimer = moving ? player.animTimer + 0.2 : player.animTimer * 0.9;
    player.vy += GRAVITY;
    player.y += player.vy;

    if (player.y > 270) {
        if (player.isJumping) { player.scaleX = 1.3; player.scaleY = 0.7; createParticles(player.x + 30, 350, "#555", 8); }
        player.y = 270; player.vy = 0; player.isJumping = false;
    }
    player.x = Math.max(0, Math.min(740, player.x));
    if (player.invulnerable > 0) player.invulnerable--;

    // Draw Player
    if (player.invulnerable % 10 < 5) {
        ctx.save();
        const bob = Math.sin(player.animTimer) * 4;
        ctx.translate(player.x + 30, player.y + 40 + bob);
        ctx.rotate(player.rotation);
        ctx.scale(player.direction * player.scaleX, player.scaleY);
        
        ctx.fillStyle = "#4B0082"; // Robe
        ctx.beginPath(); ctx.moveTo(-20, 40); ctx.lineTo(20, 40); ctx.lineTo(15, -10); ctx.lineTo(-15, -10); ctx.closePath(); ctx.fill();
        
        ctx.fillStyle = "#2E0854"; // Hat
        ctx.beginPath(); ctx.moveTo(-25, -10); ctx.lineTo(25, -10); ctx.lineTo(0, -45); ctx.closePath(); ctx.fill();
        ctx.fillRect(-28, -12, 56, 4);

        ctx.strokeStyle = "#4d2b19"; ctx.lineWidth = 4; // Staff
        ctx.beginPath(); ctx.moveTo(25, 40); ctx.lineTo(25, -20); ctx.stroke();
        ctx.fillStyle = spell === "fire" ? "#ff4500" : spell === "laser" ? "#00ffff" : "#ffff00";
        ctx.shadowBlur = 15; ctx.shadowColor = ctx.fillStyle;
        ctx.beginPath(); ctx.arc(25, -25, 6, 0, Math.PI * 2); ctx.fill(); ctx.restore();
    }

    // Particles
    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.life -= 0.02;
        ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, p.size, p.size);
        if (p.life <= 0) particles.splice(i, 1);
    });
    ctx.globalAlpha = 1.0;

    // Projectiles
    projectiles.forEach((p, i) => {
        p.x += p.vx;
        ctx.fillStyle = p.color; ctx.shadowBlur = 15; ctx.shadowColor = p.color;
        ctx.fillRect(p.x, p.y, p.width, p.height); ctx.shadowBlur = 0;
        if (p.x > 800 || p.x < -40) projectiles.splice(i, 1);
    });

    // Enemies
    spawnEnemy();
    enemies.forEach((enemy, eIdx) => {
        enemy.x -= 1.5;
        ctx.save();
        const eBob = Math.sin(Date.now() / 200) * 3;
        ctx.translate(enemy.x + 25, enemy.y + 35 + eBob);
        ctx.fillStyle = "#e0e0e0";
        ctx.beginPath(); ctx.arc(0, -25, 12, 0, Math.PI * 2); ctx.fill(); // Head
        ctx.fillStyle = "#ff0000"; ctx.beginPath(); ctx.arc(-4, -26, 2, 0, Math.PI*2); ctx.fill(); // Eye
        ctx.strokeStyle = "#e0e0e0"; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(0, -13); ctx.lineTo(0, 15); ctx.stroke(); // Spine
        ctx.restore();

        // Collisions
        projectiles.forEach((p, pIdx) => {
            if (p.x < enemy.x + 50 && p.x + p.width > enemy.x && p.y < enemy.y + 70 && p.y + 8 > enemy.y) {
                createParticles(enemy.x + 25, enemy.y + 35, "#fff", 15);
                enemies.splice(eIdx, 1);
                if (p.type !== "laser") projectiles.splice(pIdx, 1);
                score += 10; document.getElementById('score').innerText = "Score: " + score;
            }
        });

        if (player.invulnerable === 0 && player.x < enemy.x + 40 && player.x + 50 > enemy.x + 10 && player.y < enemy.y + 70 && player.y + 80 > enemy.y) {
            health--;
            document.getElementById('health').innerText = "❤️".repeat(health) + "🖤".repeat(3-health);
            if (health <= 0) { gameState = 'gameover'; document.getElementById('game-over').style.display = 'flex'; }
            player.invulnerable = 60;
        }
        if (enemy.x < -50) enemies.splice(eIdx, 1);
    });

    requestAnimationFrame(render);
}
</script>
</body>
</html>
